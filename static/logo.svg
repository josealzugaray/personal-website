<svg width="140" height="140" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer sphere -->
  <circle cx="50" cy="50" r="38" stroke="black" stroke-width="2"/>

  <!-- Latitude layers -->
  <ellipse cx="50" cy="50" rx="38" ry="20" stroke="black" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="38" ry="10" stroke="black" stroke-width="1"/>

  <!-- Longitude layers -->
  <ellipse cx="50" cy="50" rx="20" ry="38" stroke="black" stroke-width="1"/>
  <ellipse cx="50" cy="50" rx="10" ry="38" stroke="black" stroke-width="1"/>

  <!-- Central axis -->
  <line x1="50" y1="12" x2="50" y2="88" stroke="black" stroke-width="2"/>
</svg>
